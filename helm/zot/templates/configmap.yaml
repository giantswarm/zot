{{- if and .Values.mountConfig .Values.configFiles }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Values.namespace | default .Release.Namespace }}
data:
{{- range $key, $val := .Values.configFiles }}
  {{ $key }}: |
    {{ $val | toPrettyJson | nindent 4 }}
{{- end }}
{{- end }}
