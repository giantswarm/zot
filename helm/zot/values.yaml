# yaml-language-server: $schema=values.schema.json
# Giant Swarm specific values and defaults
giantswarm:
  images:
    registry: gsoci.azurecr.io
    zot:
      image: giantswarm/zot-linux-amd64
      # defaults to appVersion in chart.yaml
      tag: ""
    alpine:
      image: giantswarm/alpine
      tag: "3.18"
  verticalPodAutoscaler:
    enabled: true
    # Enables bypassing "autoscaling.k8s.io/v1" check; use with care
    force: false
    maxAllowed:
      cpu: 750m
      memory: 2048Mi
  observability:
    tenant: giantswarm

resources:
  requests:
    cpu: 300m
    memory: 1024Mi
  limits:
    cpu: 500m
    memory: 1536Mi

testPodResources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 64Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Default values for zot.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
replicaCount: 1
image:
  repository: gsoci.azurecr.io/giantswarm/zot-linux-amd64
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v2.1.18"
# Defaults to the release namespace if not specified
namespace: ""
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
serviceHeadless:
  # Enable headless service, only for statefulset
  enabled: false
  # Headless service port
  port: 5000
  # Annotations to add to the headless service
  annotations: {}
service:
  type: ClusterIP
  port: 5000
  nodePort: 32767
  # Annotations to add to the service
  annotations: {}
  # Set to a static IP if a static IP is desired, only works when
  # type: ClusterIP
  # @schema
  # type: [string, null]
  # @schema
  clusterIP: null
  # Traffic policy; https://kubernetes.io/docs/reference/networking/virtual-ips/#traffic-policies
  internalTrafficPolicy: ""
  externalTrafficPolicy: ""
  # Traffic distribution preferences; https://kubernetes.io/docs/reference/networking/virtual-ips/#traffic-distribution
  trafficDistribution: ""
# Enabling this will publicly expose your zot server
# Only enable this if you have security enabled on your cluster
ingress:
  enabled: false
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  # If using nginx, disable body limits and increase read and write timeouts
  # nginx.ingress.kubernetes.io/proxy-body-size: "0"
  # nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  # nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
  className: "nginx"
  pathtype: ImplementationSpecific
  hosts:
    - host: chart-example.local
      paths:
        - path: /
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Gateway API Route configuration
# Enabling this will create an HTTPRoute (or other route kinds) for Gateway API
# Only enable this if you have a Gateway API implementation installed
route:
  enabled: false
  # -- Set the route kind
  # Valid options are GRPCRoute, HTTPRoute, TCPRoute, TLSRoute, UDPRoute
  kind: HTTPRoute
  # -- Override the route name (defaults to release fullname)
  # @schema
  # type: [string, null]
  # @schema
  name: ""
  # -- Annotations to add to the route
  annotations: {}
  # -- Labels to add to the route
  labels: {}
  # -- Hostnames for the route (supports templating)
  hostnames: []
  # - "{{ .Release.Name }}.example.com"
  # -- Parent references to Gateway resources
  parentRefs: []
  # - name: my-gateway
  #   namespace: gateway-system
  # -- Match conditions for the route
  matches:
    - path:
        type: PathPrefix
        value: /
  # -- Filters to apply to the route
  filters: []
  # -- Additional custom rules that can be added to the route
  additionalRules: []
  # -- Envoy Gateway BackendTrafficPolicy configuration
  backendTrafficPolicy:
    enabled: false
    # -- Annotations to add to the BackendTrafficPolicy
    annotations: {}
    # -- Labels to add to the BackendTrafficPolicy
    labels: {}
    # -- Connection configuration
    # connection:
    #   bufferLimit: 1Gi
  # -- Envoy Gateway SecurityPolicy configuration
  securityPolicy:
    enabled: false
    # -- Annotations to add to the SecurityPolicy
    annotations: {}
    # -- Labels to add to the SecurityPolicy
    labels: {}
    # -- Basic authentication configuration
    # basicAuth:
    #   users:
    #     name: <secret_name>
    # -- CORS configuration
    # cors:
    #   allowOrigins:
    #     - "*"
    # -- JWT authentication configuration
    # jwt:
    #   providers:
    #     - name: my-provider
    #       issuer: https://issuer.example.com
    # -- OIDC configuration
    # oidc:
    #   provider:
    #     issuer: https://issuer.example.com
    # -- External authentication configuration
    # extAuth:
    #   http:
    #     backendRef:
    #       name: auth-service
    #       port: 80
    # -- Authorization configuration
    # authorization:
    #   defaultAction: Deny
listenerset:
  # -- Enable ListenerSet resource creation.
  enabled: false
  # -- Annotations to add to the ListenerSet resource.
  # You may use annotations compatible with your certificate management stack.
  annotations: {}
  # Example annotation:
  # cert-manager.io/cluster-issuer: letsencrypt-prod
  # -- Labels to add to the ListenerSet resource.
  labels: {}
  # -- Parent Gateway reference that this ListenerSet attaches to.
  parentRef:
    # -- Name of the parent Gateway. Required when ListenerSet is enabled.
    name: ""
    # -- Namespace of the parent Gateway. Defaults to the same namespace if not set.
    namespace: ""
    # -- Group of the parent Gateway resource.
    group: "gateway.networking.k8s.io"
    # -- Kind of the parent resource.
    kind: "Gateway"
  # -- List of listeners to configure on the parent Gateway.
  # At least one listener is required when ListenerSet is enabled.
  listeners: []
  # Example listeners configuration:
  # - name: https
  #   port: 443
  #   protocol: HTTPS
  #   hostname: "zot.example.com"
  #   tls:
  #     mode: Terminate
  #     certificateRefs:
  #       - kind: Secret
  #         name: zot-tls-cert

# By default, Kubernetes HTTP probes use HTTP 'scheme'. So if TLS is enabled
# in configuration, to prevent failures, the scheme must be set to 'HTTPS'.
httpGet:
  scheme: HTTP
  port: 5000
# By default, Kubernetes considers a Pod healthy if the liveness probe returns
# successfully. However, sometimes applications need additional startup time on
# their first initialization. By defining a startupProbe, we can allow the
# application to take extra time for initialization without compromising fast
# response to deadlocks.
startupProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
# If mountConfig is true the configMap named $CHART_RELEASE-config is mounted
# on the pod's '/etc/zot' directory
mountConfig: true
# If mountConfig is true the chart creates the '$CHART_RELEASE-config', if it
# does not exist the user is in charge of managing it (as this file includes a
# sample file you have to add it empty to handle it externally).
configFiles:
  config.json: |-
    {
      "storage": { "rootDirectory": "/var/lib/registry" },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "readTimeout": "60s",
        "writeTimeout": "60s"
      },
      "log": { "level": "debug" }
    }
# Alternatively, the configuration can include authentication and accessControl
# data and we can use mountSecret option for the passwords.
#
#  config.json: |-
#    {
#      "storage": { "rootDirectory": "/var/lib/registry" },
#      "http": {
#        "address": "0.0.0.0",
#        "port": "5000",
